version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pehenava_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pehenava
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pehenava"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pehenava_web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/pehenava?schema=public
      - DATABASE_URL_DIRECT=postgresql://postgres:postgres@postgres:5432/pehenava?schema=public
      - NEXTAUTH_SECRET=placeholder_secret_min_32_characters_long_for_auth_js
      - NEXTAUTH_URL=http://localhost:3000
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
